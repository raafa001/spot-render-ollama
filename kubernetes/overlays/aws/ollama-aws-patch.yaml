# AWS GPU Patch for Ollama
# Requires EKS node group with NVIDIA GPU support

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: spot-ai
spec:
  template:
    spec:
      nodeSelector:
        spot.ai/nodetype: gpu
        eks.amazonaws.com/capacityType: SPOT
      tolerations:
        - key: "spot.ai/nodetype"
          operator: "Equal"
          value: "gpu"
          effect: "NoSchedule"
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: ollama
          resources:
            requests:
              memory: "8Gi"
              cpu: "2"
              nvidia.com/gpu: "1"
            limits:
              memory: "16Gi"
              cpu: "4"
              nvidia.com/gpu: "1"
          env:
            - name: OLLAMA_MODEL
              value: "llama3.2:latest"
