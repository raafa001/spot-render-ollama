# Spot Render Ollama - Base Kubernetes Manifests
# =============================================================================
# PT-BR: Manifests base para deploy do Ollama com Llama para inferência LLM
# EN-US: Base manifests for Ollama + Llama deployment for LLM inference
# =============================================================================

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: spot-ai
  labels:
    app.kubernetes.io/name: spot-ai
    app.kubernetes.io/component: llm
    app.kubernetes.io/part-of: spot-render
    spot.ai/managed: "true"

---
# ConfigMap for Ollama Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-config
  namespace: spot-ai
data:
  OLLAMA_HOST: "0.0.0.0:11434"
  OLLAMA_MODELS: "/models"
  OLLAMA_NUM_PARALLEL: "1"
  OLLAMA_MAX_LOADED_MODELS: "1"

---
# ConfigMap for Ollama Environment Variables
apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-env
  namespace: spot-ai
data:
  OLLAMA_MODEL: "llama3.2:latest"

---
# PersistentVolumeClaim for Models
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: spot-ai
  labels:
    app: ollama
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: hostpath
  resources:
    requests:
      storage: 20Gi

---
# Ollama Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: spot-ai
  labels:
    app: ollama
    spot.ai/component: llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
        spot.ai/component: llm
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
              name: api
          envFrom:
            - configMapRef:
                name: ollama-config
          env:
            - name: OLLAMA_MODEL
              valueFrom:
                configMapKeyRef:
                  name: ollama-env
                  key: OLLAMA_MODEL
          resources:
            requests:
              memory: "8Gi"
              cpu: "2"
            limits:
              memory: "16Gi"
              cpu: "4"
          volumeMounts:
            - name: models
              mountPath: /models
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models

---
# ClusterIP Service for internal access
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: spot-ai
  labels:
    app: ollama
spec:
  type: ClusterIP
  ports:
    - port: 11434
      targetPort: 11434
      name: api
  selector:
    app: ollama

---
# Headless Service for stable endpoint
apiVersion: v1
kind: Service
metadata:
  name: ollama-headless
  namespace: spot-ai
  labels:
    app: ollama
spec:
  clusterIP: None
  ports:
    - port: 11434
      targetPort: 11434
      name: api
  selector:
    app: ollama

---
# HorizontalPodAutoscaler for Ollama
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ollama
  namespace: spot-ai
  labels:
    app: ollama
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ollama
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
