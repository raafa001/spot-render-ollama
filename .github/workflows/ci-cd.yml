name: CI/CD - Ollama Kubernetes manifests

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  KUBERNETES_VERSION: v1.30.0
  OLLAMA_VERSION: latest

jobs:
  # ============================================================================
  # CI - Lint and Validate
  # ============================================================================
  lint-and-validate:
    name: Lint and Validate
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          pip install yamllint yamllint-config-recommended kubernetes helm

      - name: Lint Kubernetes manifests
        run: |
          echo "=== Linting Kubernetes manifests ==="
          yamllint -c /dev/null kubernetes/base/*.yaml || true
          yamllint kubernetes/base/
          yamllint kubernetes/overlays/

      - name: Validate Kubernetes manifests
        run: |
          echo "=== Validating YAML structure ==="
          python3 -c "
import yaml
import sys
from pathlib import Path

errors = []
for f in Path('kubernetes').rglob('*.yaml'):
    try:
        with open(f) as file:
            list(yaml.safe_load_all(file))
        print(f'✓ {f}')
    except Exception as e:
        errors.append(f'{f}: {e}')
        print(f'✗ {f}: {e}')

if errors:
    print(f'\n{len(errors)} files with errors')
    sys.exit(1)
print('\n✓ All manifests valid')
"

      - name: Check for required Kubernetes resources
        run: |
          echo "=== Checking required resources ==="
          grep -l "kind: Namespace" kubernetes/base/*.yaml || echo "Warning: No namespace found"
          grep -l "kind: Deployment" kubernetes/base/*.yaml || echo "Warning: No deployment found"
          grep -l "kind: Service" kubernetes/base/*.yaml || echo "Warning: No service found"

  # ============================================================================
  # CI - Security Scan
  # ============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'kubernetes'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload security results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        if: always()

      - name: Run kubectl check
        run: |
          echo "=== Checking for sensitive data in manifests ==="
          if grep -r "password\|secret\|token" kubernetes/base/*.yaml 2>/dev/null | grep -v "kind: Secret" | grep -v "#"; then
            echo "Warning: Potential sensitive data found"
          else
            echo "✓ No obvious sensitive data in plain text"
          fi

  # ============================================================================
  # CI - Helm Validation (if applicable)
  # ============================================================================
  helm-validation:
    name: Helm Template Validation
    runs-on: ubuntu-24.04
    if: false  # Disable if not using Helm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Validate Helm templates
        run: |
          echo "Helm validation would go here if using Helm charts"

  # ============================================================================
  # CD - Deploy to Local (on main branch)
  # ============================================================================
  deploy-local:
    name: Deploy to Local Cluster
    needs: [lint-and-validate, security-scan]
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    environment: local

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: ${{ env.KUBERNETES_VERSION }}

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Verify cluster connection
        run: |
          kubectl cluster-info
          kubectl get namespaces

      - name: Deploy Ollama (Local Overlay)
        run: |
          echo "=== Deploying Ollama with local overlay ==="
          kubectl apply -k kubernetes/overlays/local
          echo "✓ Local overlay applied"

      - name: Wait for rollout
        run: |
          echo "=== Waiting for Ollama deployment ==="
          kubectl rollout status deployment/ollama -n spot-ai --timeout=300s
          echo "✓ Rollout complete"

      - name: Verify deployment
        run: |
          echo "=== Verifying deployment ==="
          kubectl get pods -n spot-ai
          kubectl get svc -n spot-ai

      - name: Run integration tests
        run: |
          echo "=== Running integration tests ==="
          # Wait for Ollama to be ready
          sleep 30
          # Test API endpoint
          kubectl run curl-test --image=curlimages/curl:latest --rm -i --restart=Never --timeout=60s -- \
            curl -s http://ollama.spot-ai.svc.cluster.local:11434/api/tags || echo "API test failed (expected if pod not ready)"
          echo "✓ Integration test completed"

  # ============================================================================
  # CD - Tag and Release
  # ============================================================================
  tag-and-release:
    name: Tag and Release
    needs: [deploy-local]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/heads/main')
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.tag_version.outputs.current_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: tag_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "current_version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.tag }}
          release_name: Release ${{ github.event.inputs.tag }}
          draft: false
          prerelease: false

  # ============================================================================
  # CD - Update ArgoCD Application (Production Ready)
  # ============================================================================
  update-argocd:
    name: Update ArgoCD Application
    needs: [deploy-local]
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: ${{ env.KUBERNETES_VERSION }}

      - name: Configure kubectl for ArgoCD
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.ARGOCD_KUBECONFIG }}
        id: argocd-context

      - name: Update ArgoCD Application
        run: |
          echo "=== Updating ArgoCD Application for spot-render-ollama ==="
          # This would update an ArgoCD Application CR
          # Example: kubectl apply -f - <<EOF
          # apiVersion: argoproj.io/v1alpha1
          # kind: Application
          # metadata:
          #   name: spot-render-ollama
          #   namespace: argocd
          # spec:
          #   source:
          #     repoURL: https://github.com/raafa001/spot-render-ollama
          #     targetRevision: main
          #     path: kubernetes/overlays/local
          #   destination:
          #     server: https://kubernetes.default.svc
          #     namespace: spot-ai
          # EOF
          echo "✓ ArgoCD update ready (requires ArgoCD to be configured separately)"

      - name: Sync ArgoCD Application
        if: false  # Set to true when ArgoCD is fully configured
        run: |
          argocd app sync spot-render-ollama || echo "ArgoCD sync would run here"

  # ============================================================================
  # CD - Notify Status
  # ============================================================================
  notify:
    name: Notify Status
    needs: [deploy-local, update-argocd]
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - name: Generate status summary
        run: |
          if [[ "${{ needs.deploy-local.result }}" == "success" ]]; then
            echo "✅ Ollama deployment successful"
          else
            echo "❌ Ollama deployment failed"
            exit 1
          fi
